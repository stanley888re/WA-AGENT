services:
  - type: web
    name: wa-agent
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: bash scripts/render-build.sh
    startCommand: node --enable-source-maps /opt/render/project/src/artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      # ── Base de données ─────────────────────────────────────────────────────
      # Utilisez DATABASE_URL (Render PostgreSQL) ou SUPABASE_DATABASE_URL
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_DATABASE_URL
        sync: false
      # ── Sécurité ────────────────────────────────────────────────────────────
      - key: SESSION_SECRET
        sync: false
      # ── Cloudinary (images produits) ────────────────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # ── Agent IA ────────────────────────────────────────────────────────────
      - key: AI_API_URL
        sync: false
      # ── Accès admin ─────────────────────────────────────────────────────────
      # Emails séparés par des virgules (ex: admin@example.com,autre@example.com)
      - key: ADMIN_EMAILS
        sync: false
      # ── CORS production ─────────────────────────────────────────────────────
      # URL publique de votre app Render (ex: https://wa-agent.onrender.com)
      # Ajoutez d'autres origines séparées par des virgules si nécessaire
      - key: ALLOWED_ORIGINS
        sync: false
